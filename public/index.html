<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDC 학교 방문 관리</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* 전체 레이아웃 - 100vh 고정 */
body {
  font-family: 'Malgun Gothic', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: #1e293b;
}

/* 1) 상단 로고 배너 */
.top-banner {
  flex-shrink: 0;
  background: #fff;
  border-bottom: 3px solid #1e3a8a;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.top-banner img { height: 52px; width: auto; object-fit: contain; }
.banner-text h1 { font-size: 19px; font-weight: 800; color: #1e3a8a; }
.banner-text p  { font-size: 12px; color: #64748b; margin-top: 1px; }
.banner-badges  { margin-left: auto; display: flex; gap: 8px; }
.bdg { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; }
.bdg-g  { background: #16a34a; }
.bdg-dg { background: #14532d; }
.bdg-r  { background: #dc2626; }

/* 2) 네비 */
nav {
  flex-shrink: 0;
  height: 44px;
  background: #1e3a8a;
  display: flex;
  align-items: stretch;
  padding: 0 16px;
  gap: 2px;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.nav-btn {
  background: none; border: none; color: rgba(255,255,255,.7);
  padding: 0 20px; font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  display: flex; align-items: center;
  position: relative;
  transition: color .15s;
}
.nav-btn:hover { color: #fff; }
.nav-btn.active { color: #fff; }
.nav-btn.active::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
  background: #93c5fd; border-radius: 2px 2px 0 0;
}
.nav-right { margin-left: auto; color: rgba(255,255,255,.5); font-size: 12px; display: flex; align-items: center; }

/* 3) 본문 - 남은 높이 전부 사용 */
main {
  flex: 1;
  min-height: 0;     /* ← flex 자식에서 overflow 동작을 위해 필수 */
  display: flex;
  background: #f1f5f9;
}

/* ── 지도 탭 ── */
#view-map {
  display: flex;
  width: 100%;
  /* height 는 부모(main)가 flex stretch 로 자동 설정 */
}

/* ── 게시판 탭 ── */
#view-board {
  display: none;
  width: 100%;
  overflow-y: auto;
  padding: 24px 20px;
}

/* ── 사이드바 ── */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: white;
  border-right: 1px solid #e2e8f0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sb-top {
  flex-shrink: 0;
  padding: 10px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
}
.s-inp {
  width: 100%; padding: 7px 10px;
  border: 1px solid #e2e8f0; border-radius: 6px;
  font-size: 13px; font-family: inherit; outline: none;
}
.s-inp:focus { border-color: #2563eb; }
.filt-row { display: flex; gap: 4px; margin-top: 7px; }
.filt {
  flex: 1; padding: 5px; border: 1px solid #e2e8f0;
  background: white; border-radius: 4px; font-size: 11px;
  font-weight: 600; cursor: pointer; font-family: inherit; color: #64748b;
}
.filt.on { background: #1e3a8a; color: white; border-color: #1e3a8a; }

.sch-list { flex: 1; overflow-y: auto; }
.sec-h {
  padding: 6px 10px; background: #f1f5f9;
  font-size: 11px; font-weight: 700; color: #475569;
  border-bottom: 1px solid #e2e8f0;
  position: sticky; top: 0; z-index: 1;
  display: flex; align-items: center; gap: 5px;
}
.sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sch-row {
  padding: 8px 10px; border-bottom: 1px solid #f1f5f9;
  cursor: pointer; display: flex; gap: 7px; align-items: flex-start;
}
.sch-row:hover { background: #f8fafc; }
.sch-row.act   { background: #eff6ff; border-left: 3px solid #2563eb; padding-left: 7px; }
.pdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.pdg { background: #14532d; }
.pg  { background: #16a34a; }
.pr  { background: #dc2626; }
.sn { font-size: 13px; font-weight: 700; color: #1e293b; }
.sm { font-size: 11px; color: #94a3b8; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 210px; }
.tag { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-right: 2px; }
.tg { background: #eff6ff; color: #2563eb; }
.tw { background: #fff7ed; color: #ea580c; }

/* ── 지도 영역 ── */
.map-area {
  flex: 1;
  min-width: 0;
  position: relative;  /* ← 자식 #map 이 absolute 로 채울 기준 */
}
#map {
  position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;  /* 부모 전체 */
}

/* 범례 */
.legend {
  position: absolute; bottom: 30px; left: 12px; z-index: 5;
  background: white; border-radius: 8px; padding: 8px 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.15); font-size: 12px;
  pointer-events: none;
}
.li { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.ld { width: 10px; height: 10px; border-radius: 50%; }

/* ── 정보 팝업 ── */
.ipop {
  background: white; border-radius: 10px;
  box-shadow: 0 8px 28px rgba(0,0,0,.18);
  padding: 14px 16px 12px;
  min-width: 225px; max-width: 290px;
  font-family: 'Malgun Gothic', sans-serif;
  font-size: 13px;
}
.it  { font-size: 15px; font-weight: 800; color: #1e3a8a; margin-bottom: 8px; }
.ir  { display: flex; gap: 5px; margin-bottom: 3px; font-size: 12px; color: #64748b; }
.idv { height: 1px; background: #f1f5f9; margin: 9px 0; }
.alb { font-size: 11px; color: #94a3b8; margin-bottom: 5px; }
.ar  { display: flex; gap: 5px; }
.ai  { flex: 1; padding: 5px 8px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 12px; font-family: inherit; outline: none; }
.ai:focus { border-color: #2563eb; }
.ab  { background: #2563eb; color: white; border: none; border-radius: 4px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; white-space: nowrap; }
.ab:hover { background: #1d4ed8; }
.icl { display: block; width: 100%; margin-top: 9px; padding-top: 8px; border-top: 1px solid #f1f5f9; background: none; border-left: none; border-right: none; border-bottom: none; font-size: 11px; color: #94a3b8; cursor: pointer; text-align: right; font-family: inherit; }

/* ── 게시판 ── */
.bw { max-width: 740px; margin: 0 auto; width: 100%; }
.bt { font-size: 22px; font-weight: 800; color: #1e3a8a; padding-bottom: 12px; border-bottom: 2px solid #1e3a8a; margin-bottom: 6px; }
.bs { font-size: 13px; color: #64748b; margin-bottom: 20px; }
.card { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 1px 6px rgba(0,0,0,.07); margin-bottom: 14px; }
.ct   { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #374151; }
.fr   { display: flex; gap: 8px; margin-bottom: 8px; }
.fi   { flex: 1; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; }
.fi:focus { border-color: #2563eb; }
textarea.fi { resize: vertical; min-height: 80px; }
.bp   { background: #1e3a8a; color: white; border: none; border-radius: 6px; padding: 8px 22px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 600; }
.bp:hover { background: #1e40af; }
.ph   { display: flex; justify-content: space-between; margin-bottom: 8px; }
.pa   { font-size: 13px; font-weight: 700; color: #1e3a8a; }
.pd   { font-size: 11px; color: #94a3b8; }
.pb   { font-size: 13px; color: #374151; line-height: 1.75; white-space: pre-wrap; }
.pf   { margin-top: 10px; display: flex; gap: 6px; }
.bsm  { background: none; border: 1px solid #e2e8f0; border-radius: 4px; padding: 3px 10px; font-size: 11px; color: #64748b; cursor: pointer; font-family: inherit; }
.bsm:hover { background: #f8fafc; }
.cs   { margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 8px; }
.ci   { padding: 5px 0; border-bottom: 1px solid #f8fafc; }
.ca   { font-size: 12px; font-weight: 700; color: #374151; }
.cdt  { font-size: 10px; color: #94a3b8; margin-left: 5px; }
.cb   { font-size: 12px; color: #64748b; margin-top: 2px; }
.cf   { display: flex; gap: 6px; margin-top: 10px; }
</style>
</head>
<body>

<!-- 상단 배너 -->
<div class="top-banner">
  <img src="/logo.jpg" alt="로고" onerror="this.style.display='none'">
  <div class="banner-text">
    <h1>학교 방문 관리 시스템</h1>
    <p>서울특별시교육청 · 방문 일정 및 담당자 관리</p>
  </div>
  <div class="banner-badges">
    <span class="bdg bdg-dg" id="badge-last">● 저번주 —</span>
    <span class="bdg bdg-g"  id="badge-this">● 이번주 —</span>
    <span class="bdg bdg-r"  id="badge-unassigned">● 미배정 —</span>
  </div>
</div>

<!-- 네비 -->
<nav>
  <button class="nav-btn active" id="tab-map"   onclick="switchTab('map')">🗺 방문 지도</button>
  <button class="nav-btn"        id="tab-board" onclick="switchTab('board')">📋 선생님 게시판</button>
  <div class="nav-right" id="nav-date"></div>
</nav>

<!-- 본문 -->
<main>

  <!-- 지도 탭 -->
  <div id="view-map">
    <div class="sidebar">
      <div class="sb-top">
        <input class="s-inp" id="search" type="text" placeholder="🔍 학교명 / 담당자 검색">
        <div class="filt-row">
          <button class="filt on" onclick="setFilt('all',this)">전체</button>
          <button class="filt"    onclick="setFilt('current',this)">이번주</button>
          <button class="filt"    onclick="setFilt('last',this)">저번주</button>
          <button class="filt"    onclick="setFilt('unassigned',this)">미배정</button>
        </div>
      </div>
      <div class="sch-list" id="sch-list">
        <div style="padding:30px;text-align:center;color:#94a3b8;font-size:13px">불러오는 중...</div>
      </div>
    </div>

    <div class="map-area">
      <div id="map"></div>
      <div class="legend">
        <div class="li"><span class="ld" style="background:#16a34a"></span>이번주 방문 (배정완료)</div>
        <div class="li"><span class="ld" style="background:#14532d"></span>저번주 방문완료</div>
        <div class="li"><span class="ld" style="background:#dc2626"></span>미배정</div>
      </div>
    </div>
  </div>

  <!-- 게시판 탭 -->
  <div id="view-board">
    <div class="bw">
      <div class="bt">선생님 게시판</div>
      <p class="bs">비로그인으로 글을 작성하고 댓글을 남길 수 있습니다.</p>
      <div class="card">
        <div class="ct">새 글 작성</div>
        <div class="fr">
          <input class="fi" id="f-author" placeholder="작성자" style="max-width:130px">
          <input class="fi" id="f-pw" type="password" placeholder="비밀번호 (삭제용)">
        </div>
        <textarea class="fi" id="f-body" placeholder="내용을 입력하세요..."></textarea>
        <div style="margin-top:10px;text-align:right">
          <button class="bp" onclick="submitPost()">게시하기</button>
        </div>
      </div>
      <div id="post-list"></div>
    </div>
  </div>

</main>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=220b3c4d0d3d7a0339d6a608e494a10a&libraries=clusterer"></script>
<script>
/* ── 날짜 ── */
document.getElementById('nav-date').textContent =
  new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

/* ── state ── */
let map, allSchools = [], teacherMap = {};
let openOv = null, actEl = null, curFilt = 'all';

/* ── init ── */
async function init() {
  const [data, teachers] = await Promise.all([
    fetch('/api/mapdata').then(r => r.json()),
    fetch('/api/nextweek-teachers').then(r => r.json())
  ]);
  teacherMap = teachers;
  allSchools = [
    ...data.this_week_gangnam.map(s => ({ ...s, week: 'this' })),
    ...data.this_week_bangwha.map(s =>  ({ ...s, week: 'this' })),
    ...data.unvisited_gangnam.map(s => ({ ...s, week: 'next' })),
    ...data.unvisited_bangwha.map(s =>  ({ ...s, week: 'next' })),
  ];
  const last       = allSchools.filter(s => s.week === 'this').length;
  const current    = allSchools.filter(s => s.week === 'next' && teacherMap[s.name]).length;
  const unassigned = allSchools.filter(s => s.week === 'next' && !teacherMap[s.name]).length;
  document.getElementById('badge-last').textContent       = `● 저번주 ${last}`;
  document.getElementById('badge-this').textContent       = `● 이번주 ${current}`;
  document.getElementById('badge-unassigned').textContent = `● 미배정 ${unassigned}`;
  initMap();
  renderList();
}

/* ── 카카오맵 ── */
function mkImg(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16">
    <circle cx="8" cy="8" r="7" fill="${color}" stroke="white" stroke-width="2.5"/>
  </svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml,' + encodeURIComponent(svg),
    new kakao.maps.Size(16, 16), { offset: new kakao.maps.Point(8, 8) }
  );
}

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.541, 126.986),
    level: 9
  });
  map.addControl(new kakao.maps.ZoomControl(),    kakao.maps.ControlPosition.RIGHT);
  map.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);

  const iLast    = mkImg('#14532d');
  const iCurrent = mkImg('#16a34a');
  const iRed     = mkImg('#dc2626');
  const markers = [];
  allSchools.forEach(s => {
    if (!s.lat || !s.lon) return;
    let img;
    if (s.week === 'this')            img = iLast;
    else if (teacherMap[s.name])      img = iCurrent;
    else                              img = iRed;
    const m = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(s.lat, s.lon),
      image: img,
      title: s.name
    });
    s._m = m;
    kakao.maps.event.addListener(m, 'click', () => showInfo(s));
    markers.push(m);
  });

  new kakao.maps.MarkerClusterer({
    map, markers, averageCenter: true, minLevel: 8,
    styles: [{
      width:'40px', height:'40px', borderRadius:'50%',
      background:'rgba(30,58,138,.88)', color:'#fff',
      textAlign:'center', lineHeight:'40px', fontSize:'13px',
      fontWeight:'700', fontFamily:'Malgun Gothic,sans-serif',
      border:'2px solid rgba(255,255,255,.5)'
    }]
  });

  kakao.maps.event.addListener(map, 'click', closeInfo);
}

/* ── 팝업 ── */
function showInfo(s) {
  closeInfo();
  const isNext = s.week === 'next';
  const teacher = isNext ? (teacherMap[s.name] || '') : (s.teacher || '');

  const box = document.createElement('div');
  box.className = 'ipop';
  box.innerHTML = `
    <div class="it">${esc(s.name)}</div>
    <div class="ir">📍 ${esc(s.addr || '')}</div>
    ${s.subway ? `<div class="ir">🚇 ${esc(s.subway)}</div>` : ''}
    ${s.region ? `<div class="ir">🏢 ${esc(s.region)}</div>` : ''}
    <div class="idv"></div>
    ${isNext ? `
      <div class="alb">담당자 지정</div>
      <div class="ar">
        <input class="ai" id="ai" value="${esc(teacher)}" placeholder="선생님 이름">
        <button class="ab" id="asv">저장</button>
      </div>
    ` : `
      <div class="ir">👩‍🏫 담당: <strong style="color:#1e3a8a;font-size:13px;margin-left:4px">${esc(teacher||'미지정')}</strong></div>
    `}
    <button class="icl" id="icl">닫기 ✕</button>
  `;

  box.querySelector('#icl').addEventListener('click', e => { e.stopPropagation(); closeInfo(); });
  if (isNext) {
    const inp = box.querySelector('#ai');
    box.querySelector('#asv').addEventListener('click', e => { e.stopPropagation(); saveTeacher(s.name, inp.value.trim(), box); });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveTeacher(s.name, inp.value.trim(), box); });
  }

  openOv = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(s.lat, s.lon),
    content: box, yAnchor: 1.12, zIndex: 10
  });
  openOv.setMap(map);
  map.panTo(new kakao.maps.LatLng(s.lat, s.lon));

  if (actEl) actEl.classList.remove('act');
  actEl = s._el || null;
  if (actEl) { actEl.classList.add('act'); actEl.scrollIntoView({ block: 'nearest' }); }
}

function closeInfo() {
  if (openOv) { openOv.setMap(null); openOv = null; }
}

/* ── 담당자 저장 ── */
async function saveTeacher(name, teacher, box) {
  await fetch(`/api/nextweek-teachers/${encodeURIComponent(name)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ teacher })
  });
  if (teacher) teacherMap[name] = teacher; else delete teacherMap[name];
  const btn = box.querySelector('#asv');
  btn.textContent = '✓ 저장됨'; btn.disabled = true;
  setTimeout(() => { btn.textContent = '저장'; btn.disabled = false; }, 1500);
  renderList();
}

/* ── 목록 ── */
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allSchools.filter(s => {
    const teacher = s.week === 'this' ? s.teacher : teacherMap[s.name];
    if (curFilt === 'current'    && !(s.week === 'next' && teacherMap[s.name])) return false;
    if (curFilt === 'last'       && s.week !== 'this') return false;
    if (curFilt === 'unassigned' && !(s.week === 'next' && !teacherMap[s.name])) return false;
    if (!q) return true;
    return s.name.toLowerCase().includes(q) || (teacher||'').toLowerCase().includes(q);
  });

  const current    = filtered.filter(s => s.week === 'next' && teacherMap[s.name]);
  const last       = filtered.filter(s => s.week === 'this');
  const unassigned = filtered.filter(s => s.week === 'next' && !teacherMap[s.name]);
  const list = document.getElementById('sch-list');
  list.innerHTML = '';

  function sec(label, items, pc, dc) {
    if (!items.length) return;
    const h = document.createElement('div');
    h.className = 'sec-h';
    h.innerHTML = `<span class="sdot" style="background:${dc}"></span>${label}<span style="margin-left:auto;font-weight:400;color:#94a3b8">${items.length}개</span>`;
    list.appendChild(h);
    items.forEach(s => {
      const teacher = s.week === 'this' ? (s.teacher||'') : (teacherMap[s.name]||'');
      const addr = (s.addr||'').replace('서울특별시 ','').substring(0,17);
      const div = document.createElement('div');
      div.className = 'sch-row';
      div.innerHTML = `
        <span class="pdot ${pc}"></span>
        <div style="min-width:0">
          <div class="sn">${esc(s.name)}</div>
          <div class="sm">${teacher ? `<span class="tag tg">${esc(teacher)}</span>` : `<span class="tag tw">미지정</span>`}${esc(addr)}</div>
        </div>`;
      div.addEventListener('click', () => showInfo(s));
      s._el = div;
      list.appendChild(div);
    });
  }

  sec('이번주 방문 (배정완료)', current,    'pg',  '#16a34a');
  sec('저번주 방문완료',        last,        'pdg', '#14532d');
  sec('미배정',                 unassigned,  'pr',  '#dc2626');

  if (!tw.length && !nw.length)
    list.innerHTML = '<div style="padding:30px;text-align:center;color:#94a3b8;font-size:13px">검색 결과 없음</div>';
}

document.getElementById('search').addEventListener('input', renderList);

function setFilt(f, btn) {
  curFilt = f;
  document.querySelectorAll('.filt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

/* ── 탭 ── */
function switchTab(tab) {
  document.getElementById('view-map').style.display   = tab === 'map'   ? 'flex'  : 'none';
  document.getElementById('view-board').style.display = tab === 'board' ? 'block' : 'none';
  document.getElementById('tab-map').classList.toggle('active',   tab === 'map');
  document.getElementById('tab-board').classList.toggle('active', tab === 'board');
  if (tab === 'board') loadPosts();
}

/* ── 게시판 ── */
async function loadPosts() {
  const posts = await fetch('/api/posts').then(r => r.json());
  const el = document.getElementById('post-list');
  if (!posts.length) {
    el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:40px;font-size:13px">아직 게시글이 없습니다.</div>';
    return;
  }
  el.innerHTML = '';
  posts.forEach(post => {
    const c = document.createElement('div'); c.className = 'card';
    c.innerHTML = `
      <div class="ph"><span class="pa">${esc(post.author)}</span><span class="pd">${fmt(post.createdAt)}</span></div>
      <div class="pb">${esc(post.body)}</div>
      <div class="pf">
        <button class="bsm" data-c="${post.id}">💬 댓글 ${post.comments.length}</button>
        <button class="bsm" data-d="${post.id}">🗑 삭제</button>
      </div>
      <div id="cv-${post.id}" style="display:none">
        <div class="cs">
          ${post.comments.map(cm => `<div class="ci"><span class="ca">${esc(cm.author)}</span><span class="cdt">${fmt(cm.createdAt)}</span><div class="cb">${esc(cm.body)}</div></div>`).join('')}
          <div class="cf">
            <input class="fi" id="ca-${post.id}" placeholder="작성자" style="max-width:100px">
            <input class="fi" id="cb-${post.id}" placeholder="댓글 내용...">
            <button class="bp" style="padding:7px 12px;font-size:12px" data-s="${post.id}">등록</button>
          </div>
        </div>
      </div>`;
    c.querySelector('[data-c]').addEventListener('click', () => { const d = document.getElementById(`cv-${post.id}`); d.style.display = d.style.display==='none'?'block':'none'; });
    c.querySelector('[data-d]').addEventListener('click', () => delPost(post.id));
    c.querySelector('[data-s]').addEventListener('click', () => addComment(post.id));
    el.appendChild(c);
  });
}

async function submitPost() {
  const author = document.getElementById('f-author').value.trim();
  const pw     = document.getElementById('f-pw').value;
  const body   = document.getElementById('f-body').value.trim();
  if (!author||!pw||!body) { alert('작성자, 비밀번호, 내용을 모두 입력해주세요.'); return; }
  const r = await fetch('/api/posts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({author,pw,body}) });
  if (r.ok) { document.getElementById('f-body').value=''; loadPosts(); }
}

async function addComment(id) {
  const author = document.getElementById(`ca-${id}`).value.trim();
  const body   = document.getElementById(`cb-${id}`).value.trim();
  if (!author||!body) { alert('작성자와 댓글 내용을 입력해주세요.'); return; }
  const r = await fetch(`/api/posts/${id}/comments`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({author,body}) });
  if (r.ok) loadPosts();
}

async function delPost(id) {
  const pw = prompt('삭제 비밀번호를 입력하세요:');
  if (!pw) return;
  const r = await fetch(`/api/posts/${id}`, { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({pw}) });
  if (r.ok) loadPosts(); else alert('비밀번호가 틀렸습니다.');
}

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(iso) { return new Date(iso).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }

init();
</script>
